<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vellum{% endblock %} - Smart Legal Document Manager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-slate-800 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <a href="/" class="text-xl font-bold hover:text-blue-300 transition">Vellum</a>
                <div class="space-x-4">
                    <a href="/" class="hover:text-blue-300 transition">Documents</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-800 text-gray-400 mt-auto">
        <div class="max-w-6xl mx-auto px-4 py-4 text-center text-sm">
            &copy; 2026 Vellum - Smart Legal Document Manager
        </div>
    </footer>
</body>
</html>
