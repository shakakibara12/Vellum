<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vellum{% endblock %} - Smart Legal Document Manager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* Diff styling for dark theme */
        .diff-container table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .diff-container th {
            background: #161b22;
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 500;
            color: #8b949e;
            border: 1px solid #30363d;
        }
        .diff-container td {
            padding: 0.375rem 0.75rem;
            border: 1px solid #30363d;
            font-family: inherit;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }
        .diff-container .diff_add {
            background: #23863666;
            color: #56d364;
        }
        .diff-container .diff_sub {
            background: #da363366;
            color: #ff7b72;
            text-decoration: line-through;
        }
        .diff-container .diff_chg {
            background: #d2992266;
            color: #d29922;
        }
        .diff-container .diff_empty {
            background: #161b22;
            color: #484f58;
        }
        .diff-container tr:hover td {
            background: #1c2128;
        }
    </style>
</head>
<body class="bg-[#0d1117] min-h-full flex flex-col font-sans antialiased text-[#c9d1d9]">
    <nav class="bg-[#161b22] border-b border-[#30363d] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <a href="/" class="text-lg font-semibold text-[#c9d1d9] hover:text-[#58a6ff] transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    Vellum
                </a>
                <div class="flex items-center gap-6">
                    <a href="/" class="text-sm text-[#8b949e] hover:text-[#c9d1d9] transition">Documents</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 w-full flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-[#161b22] border-t border-[#30363d] mt-auto">
        <div class="max-w-7xl mx-auto px-6 py-5 text-center text-sm text-[#8b949e]">
            <p>&copy; 2026 Vellum — Smart Legal Document Manager</p>
        </div>
    </footer>
</body>
</html>
